<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Filtro de Produtos</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
font-size:16px;
width:200px;
}

button{
padding:10px 20px;
font-size:16px;
margin-left:10px;
cursor:pointer;
}

.produto{
border-bottom:1px solid #ddd;
padding:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Filtro de Produtos</h2>

<p>Eu posso gastar até:</p>

<input type="number" id="valor" placeholder="R$">
<button onclick="filtrar()">Buscar</button>

<div id="resultado"></div>

</div>

<script>

const produtos = [

{nome:"Bateria IPhone 11", preco:399.99, link:"https://www.instagram.com/mymagicstoresousa?igsh=eGRwc3F5eWxhZWYw"},

{nome:"Cabo Santo Ângelo", preco:68.82, link:"https://www.mercadolivre.com.br/p/MLB23157657"},

{nome:"iPhone 16", preco:4775.99, link:"https://www.amazon.com.br/Apple-iPhone-16-128-GB/dp/B0DJFTJ6LX"},

{nome:"iPhone 16 Pro", preco:6119.99, link:"https://www.instagram.com/jv_imports_"},

{nome:"iPhone 17", preco:6667.99, link:"https://www.instagram.com/jv_imports_"},

{nome:"iPhone 17 Pro", preco:9371.99, link:"https://www.instagram.com/juy_cell"},

{nome:"Kit violão", preco:1993.99, link:"https://www.mercadolivre.com.br/up/MLBU3704300010"},

{nome:"Mala Viagem", preco:474.90, link:"https://www.mercadolivre.com.br/up/MLBU2979674904"},

{nome:"Mi Box S Tv Box", preco:417.09, link:"https://www.mercadolivre.com.br/up/MLBU3439088838"},

{nome:"Mochila 50L", preco:128.15, link:"https://produto.mercadolivre.com.br/MLB-4136051377"},

{nome:"Mochila Executiva Grande", preco:110.31, link:"https://produto.mercadolivre.com.br/MLB-3898735809"},

{nome:"S24 Ultra", preco:5498.99, link:"https://www.amazon.com.br/Smartphone-Samsung-Galaxy-Selfie-1-120Hz/dp/B0CQD9VK7X"},

{nome:"S25 Ultra", preco:6420.99, link:"https://shop.samsung.com/br/galaxy-s25-ultra/p"},

{nome:"Tapa Olho", preco:21.66, link:"https://www.mercadolivre.com.br/p/MLB52127724"}

]

function filtrar(){

let valor = document.getElementById("valor").value
let resultado = document.getElementById("resultado")

resultado.innerHTML = ""

produtos
.sort((a,b)=>a.nome.localeCompare(b.nome))
.forEach(produto=>{

if(produto.preco <= valor){

resultado.innerHTML += `

<div class="produto">

<b>${produto.nome}</b><br>

Preço: R$ ${produto.preco}<br>

<a href="${produto.link}" target="_blank">Ver oferta</a>

</div>

`

}

})

}

</script>

</body>

</html>
